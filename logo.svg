<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="97" fill="#0d1117"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#21262d" stroke-width="2"/>

  <!-- Star field -->
  <circle cx="38"  cy="42"  r="1.2" fill="white" opacity="0.5"/>
  <circle cx="62"  cy="28"  r="1.0" fill="white" opacity="0.4"/>
  <circle cx="88"  cy="36"  r="0.8" fill="white" opacity="0.35"/>
  <circle cx="115" cy="30"  r="1.0" fill="white" opacity="0.4"/>
  <circle cx="158" cy="44"  r="1.2" fill="white" opacity="0.45"/>
  <circle cx="170" cy="68"  r="0.8" fill="white" opacity="0.3"/>
  <circle cx="32"  cy="75"  r="0.8" fill="white" opacity="0.35"/>
  <circle cx="48"  cy="90"  r="1.0" fill="white" opacity="0.3"/>
  <circle cx="175" cy="90"  r="0.8" fill="white" opacity="0.3"/>
  <circle cx="22"  cy="118" r="0.8" fill="white" opacity="0.25"/>
  <circle cx="178" cy="118" r="0.8" fill="white" opacity="0.25"/>

  <!-- Horizon line -->
  <!-- Pivot at (100, 128), radius 72, measured angle 50° -->
  <line x1="15" y1="128" x2="185" y2="128"
        stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>
  <circle cx="15"  cy="128" r="1.5" fill="#3b82f6" opacity="0.55"/>
  <circle cx="185" cy="128" r="1.5" fill="#3b82f6" opacity="0.55"/>

  <!-- Sextant arc: pivot (100,128), r=72, from 0° to 50° above horizon -->
  <!-- Start (0°): (172, 128)  End (50°): (146, 73)  sweep=0 (CCW on screen = upward) -->
  <path d="M 172 128 A 72 72 0 0 0 146 73"
        fill="none"
        stroke="url(#arcGrad)"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Tick at 17°: outer r=72 → (169,107)  inner r=63 → (160,110) -->
  <line x1="169" y1="107" x2="160" y2="110"
        stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Tick at 33°: outer r=72 → (160,89)  inner r=63 → (153,94) -->
  <line x1="160" y1="89" x2="153" y2="94"
        stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Index arm: pivot to celestial body -->
  <line x1="100" y1="128" x2="146" y2="73"
        stroke="white" stroke-width="2" opacity="0.9" stroke-linecap="round"/>

  <!-- Horizon reference arm -->
  <line x1="100" y1="128" x2="172" y2="128"
        stroke="white" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Small angle indicator arc: r=22, same angle -->
  <!-- Start (0°): (122, 128)  End (50°): (114, 111) -->
  <path d="M 122 128 A 22 22 0 0 0 114 111"
        fill="none"
        stroke="#a855f7"
        stroke-width="1.5"
        opacity="0.85"
        stroke-linecap="round"/>

  <!-- Pivot dot -->
  <circle cx="100" cy="128" r="3.5" fill="white"/>

  <!-- Celestial body (star) at (146, 73) -->
  <circle cx="146" cy="73" r="10" fill="#f59e0b" opacity="0.10" filter="url(#starGlow)"/>
  <circle cx="146" cy="73" r="4"  fill="#fbbf24" opacity="0.40"/>
  <circle cx="146" cy="73" r="2.5" fill="#fef3c7"/>
  <!-- 4-point rays -->
  <line x1="146" y1="66" x2="146" y2="80" stroke="#fbbf24" stroke-width="1"   opacity="0.7"/>
  <line x1="139" y1="73" x2="153" y2="73" stroke="#fbbf24" stroke-width="1"   opacity="0.7"/>
  <line x1="141" y1="68" x2="151" y2="78" stroke="#fbbf24" stroke-width="0.7" opacity="0.4"/>
  <line x1="151" y1="68" x2="141" y2="78" stroke="#fbbf24" stroke-width="0.7" opacity="0.4"/>
</svg>
